apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "whisper.fullname" . }}-rotate
  labels:
    {{- include "whisper.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.rotation.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rotate
              image: curlimages/curl:latest
              command:
                - curl
                - -sf
                - -X
                - POST
                - "http://{{ include "whisper.fullname" . }}:{{ .Values.service.port }}/api/rotate"
