spring.application.name=whisper
server.port=8080

# Virtual threads (Java 21+)
spring.threads.virtual.enabled=true

# SQLite (local dev). Override with WHISPER_DB_URL for Turso in production.
whisper.db.url=${WHISPER_DB_URL:jdbc:sqlite:whisper.db}

# ntfy.sh base URL
whisper.ntfy.base-url=${WHISPER_NTFY_URL:https://ntfy.sh}

# HikariCP connection pool
whisper.db.pool.max-size=${WHISPER_DB_POOL_SIZE:10}
whisper.db.pool.min-idle=${WHISPER_DB_POOL_MIN_IDLE:2}

# Rate limiting: requests per minute on /api/rotate
whisper.rate-limit.rotate-rpm=${WHISPER_RATE_LIMIT_RPM:10}

# Google OAuth2 (set these env vars in production on OCI)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Comma-separated allowed emails (fallback for local dev without Turso allowlist table)
whisper.allowed-emails=${WHISPER_ALLOWED_EMAILS:}
