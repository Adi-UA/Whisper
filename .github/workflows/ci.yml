name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (wordgen)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordgen
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wordgen
      - run: cargo build --release
      - run: cargo test
      - name: Upload native lib
        uses: actions/upload-artifact@v4
        with:
          name: libwhisper-wordgen
          path: wordgen/target/release/libwhisper_wordgen.so

  java:
    name: Java (service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven
      - run: ./mvnw verify

  integration:
    name: Integration (Rust + Java)
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wordgen
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven
      - name: Build Rust lib
        run: cd wordgen && cargo build --release
      - name: Run Java tests with JNI
        run: |
          cd service
          ./mvnw verify -Djava.library.path=../wordgen/target/release
      - name: Smoke test (start server, create group, rotate)
        run: |
          cd service
          java -Djava.library.path=../wordgen/target/release \
               -jar target/whisper-service-0.0.1-SNAPSHOT.jar &
          # Wait for the server to become ready (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Create group
          GROUP_ID=$(curl -sf -X POST http://localhost:8080/api/groups \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-test"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created group: $GROUP_ID"
          # Add a member (ntfy topic is unsubscribed, notification goes nowhere)
          curl -sf -X POST "http://localhost:8080/api/groups/$GROUP_ID/members" \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Bot","channel":"ntfy:ci-test-topic"}'
          # Rotate
          RESULT=$(curl -sf -X POST http://localhost:8080/api/rotate)
          echo "Rotate result: $RESULT"
          echo "$RESULT" | python3 -c "import sys,json; assert json.load(sys.stdin)['rotated']==1"
          # Verify history
          HISTORY=$(curl -sf "http://localhost:8080/api/groups/$GROUP_ID/history")
          echo "History: $HISTORY"
          echo "$HISTORY" | python3 -c "import sys,json; h=json.load(sys.stdin); assert len(h)==1 and ' ' in h[0]['phrase']"
          echo "✅ Integration test passed"
