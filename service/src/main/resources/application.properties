spring.application.name=whisper
server.port=8080

# Virtual threads (Java 21+)
spring.threads.virtual.enabled=true

# SQLite (local dev). Override with WHISPER_DB_URL for Turso.
whisper.db.url=${WHISPER_DB_URL:jdbc:sqlite:whisper.db}

# ntfy.sh base URL
whisper.ntfy.base-url=${WHISPER_NTFY_URL:https://ntfy.sh}

# HikariCP connection pool
whisper.db.pool.max-size=${WHISPER_DB_POOL_SIZE:10}
whisper.db.pool.min-idle=${WHISPER_DB_POOL_MIN_IDLE:2}

# Rate limiting: requests per minute per IP on /api/rotate
whisper.rate-limit.rotate-rpm=${WHISPER_RATE_LIMIT_RPM:10}
